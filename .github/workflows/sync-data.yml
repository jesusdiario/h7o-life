name: Sincronizar dados (upstream)

# Copia os arquivos de dados (public/data) já atualizados pelo projeto
# original (26worldcup) e os republica neste repositório. O app não busca
# dados ao vivo em runtime — ele lê esses JSON — então este robô é o que
# mantém placares, tabelas e probabilidades atualizados.

on:
  schedule:
    - cron: '*/15 * * * *' # a cada 15 minutos (horário UTC, melhor esforço)
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

# evita execuções sobrepostas
concurrency:
  group: sync-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Buscar dados do projeto original
        run: |
          git clone --depth 1 https://github.com/26worldcup/26worldcup.github.io.git /tmp/upstream
          rm -rf public/data
          mkdir -p public/data
          cp -R /tmp/upstream/public/data/. public/data/

      - name: Commitar e enviar se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/data)" ]; then
            git add public/data
            git commit -m "dados: sincroniza do projeto original ($(date -u +%FT%TZ))"
            git push
            echo "Dados atualizados e enviados."
          else
            echo "Sem mudanças nos dados — nada a enviar."
          fi
